<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Usage</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" media="print" onload="this.media='all'">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --border: #2a2f3a;
    --text: #ffffff;
    --text-dim: #ffffff;
    --accent: #d97757;
    --accent2: #5c9eff;
    --green: #4caf82;
    --yellow: #e6b84a;
    --red: #e05c5c;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    user-select: none;
    min-width: 200px;
  }

  /* 드래그 핸들 */
  #header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 8px 10px 6px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    cursor: move;
    -webkit-app-region: drag;
  }

  #header-left {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #clawd-canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  #header-title {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  #header-controls {
    display: flex;
    align-items: flex-start;
    gap: 4px;
    -webkit-app-region: no-drag;
  }

  .ctrl-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 9px;
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .ctrl-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(217,119,87,0.08); }

  /* 상태 바 */
  #status-bar {
    padding: 4px 10px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #status-text {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  #next-update {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  /* 콘텐츠 영역 */
  #content {
    padding: 8px 10px;
  }

  /* 사용량 행 */
  .quota-row {
    margin-bottom: 8px;
  }
  .quota-row:last-child { margin-bottom: 0; }

  .quota-label-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }

  .quota-label {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .quota-values {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 10px;
    color: var(--text);
  }

  .quota-reset {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
    text-align: right;
  }

  /* 프로그레스 바 */
  .bar-track {
    width: 100%;
    height: 5px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease, background-color 0.3s ease;
    background: var(--green);
  }

  .bar-fill.warn { background: var(--yellow); }
  .bar-fill.danger { background: var(--red); }

  /* 구분선 */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 7px 0;
  }

  /* 섹션 레이블 (상세 모드) */
  .section-label {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.6;
  }

  /* 에러/로딩 상태 */
  #empty-state {
    padding: 16px 10px;
    text-align: center;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 10px;
  }

  /* 추가 사용량 강조 */
  .extra-badge {
    display: inline-block;
    background: rgba(230, 184, 74, 0.12);
    border: 1px solid rgba(230, 184, 74, 0.3);
    color: var(--yellow);
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.05em;
  }

  /* 버전 표시 */
  #footer {
    padding: 4px 10px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #stale-indicator {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 9px;
    color: var(--red);
    display: none;
  }

  body.stale #content { opacity: 0.4; }
  body.stale #stale-indicator { display: block; }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <canvas id="clawd-canvas" width="45" height="45"></canvas>
    <span id="header-title">CLAUDE<br>USAGE</span>
  </div>
  <div id="header-controls">
    <button class="ctrl-btn" onclick="if(window.pywebview) pywebview.api.close()" style="border-color:transparent; opacity:0.5;">✕</button>
  </div>
</div>

<div id="status-bar">
  <span id="status-text">Connecting...</span>
  <span id="next-update"></span>
</div>

<div id="content">
  <div id="empty-state">Loading usage data...</div>
</div>

<div id="footer">
  <span id="stale-indicator">⚠ stale</span>
</div>

<script>
  let currentMode = 'simple';
  let usageData = null;
  let lastUpdated = null;
  let pollInterval = 60;
  let countdownTimer = null;
  let countdown = 0;

  // Python(pywebview)에서 호출하는 진입점
  function updateData(data, mode, interval) {
    usageData = data;
    currentMode = mode || currentMode;
    pollInterval = interval || pollInterval;
    lastUpdated = Date.now();
    countdown = pollInterval;
    document.body.classList.remove('stale');
    setMode(currentMode, false);
    renderContent();
    startCountdown();
  }

  function markStale(reason) {
    document.body.classList.add('stale');
    const reauth = (reason === 'reauth_needed' || reason === 'no_credentials' || reason === 'no_refresh_token');
    if (reauth) {
      const labelMap = {
        reauth_needed: 'Refresh token rejected',
        no_credentials: 'credentials.json not found',
        no_refresh_token: 'refreshToken missing',
      };
      document.getElementById('status-text').textContent = labelMap[reason] || 'Auth failed';
      const el = document.getElementById('content');
      el.style.opacity = '1';
      el.innerHTML =
        '<div id="empty-state" style="color:var(--red); line-height:1.6">' +
        'Claude Code CLI 재실행 필요<br>' +
        '<span style="color:var(--text); font-size:9px">' +
        '터미널에서 <code>claude</code> 실행 후 <code>/login</code>' +
        '</span></div>';
    } else {
      document.getElementById('status-text').textContent = 'Update failed';
    }
  }

  function setMode(mode, notify = true) {
    currentMode = mode;
    renderContent();
    if (notify && window.pywebview) {
      pywebview.api.set_mode(mode);
    }
  }

  function startCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        document.getElementById('next-update').textContent = 'updating...';
      } else {
        document.getElementById('next-update').textContent = `next: ${countdown}s`;
      }
    }, 1000);
  }

  function renderContent() {
    if (!usageData) return;

    const now = new Date();
    const ago = lastUpdated ? Math.round((Date.now() - lastUpdated) / 1000) : 0;
    document.getElementById('status-text').textContent = `Updated ${ago}s ago`;

    if (currentMode === 'simple') {
      renderSimple();
    } else {
      renderDetailed();
    }

    if (window.pywebview) {
      const h = document.body.scrollHeight;
      pywebview.api.resize(h);
    }
  }

  function renderSimple() {
    const d = usageData;
    let html = '';

    // 5시간 세션
    if (d.five_hour) {
      html += quotaRow('5H SESSION', d.five_hour, true);
    }
    // 주간
    if (d.seven_day) {
      html += '<div class="divider"></div>';
      html += quotaRow('WEEKLY', d.seven_day, true);
    }
    const el = document.getElementById('content');
    el.innerHTML = html || '<div id="empty-state">No data available</div>';
  }

  function renderDetailed() {
    const d = usageData;
    let html = '';
    const skip = ['extra_usage'];

    // 알려진 quota 필드 순서 우선
    const knownOrder = ['five_hour', 'seven_day', 'seven_day_sonnet', 'seven_day_opus'];
    const keys = [
      ...knownOrder.filter(k => d[k] != null),
      ...Object.keys(d).filter(k => !knownOrder.includes(k) && !skip.includes(k) && d[k] != null && typeof d[k] === 'object')
    ];

    keys.forEach((key, i) => {
      if (i > 0) html += '<div class="divider"></div>';
      html += quotaRow(formatKey(key), d[key], true);
    });

    // 추가 사용량
    if (d.extra_usage !== undefined && d.extra_usage !== null) {
      html += '<div class="divider"></div>';
      html += extraUsageRow(d.extra_usage);
    }

    const el = document.getElementById('content');
    el.innerHTML = html || '<div id="empty-state">No data available</div>';
  }

  function quotaRow(label, quota, showReset) {
    if (!quota) return '';
    const pct = Math.min(quota.utilization ?? 0, 100);
    const barClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
    const pctText = `${pct.toFixed(1)}%`;
    const resetText = quota.resets_at ? resetCountdown(quota.resets_at) : '';

    return `
      <div class="quota-row">
        <div class="quota-label-row">
          <span class="quota-label">${label}</span>
          <span class="quota-values">${pctText}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${barClass}" style="width:${pct}%"></div>
        </div>
        ${showReset && resetText ? `<div class="quota-reset">${resetText}</div>` : ''}
      </div>`;
  }

  function extraUsageRow(extra) {
    if (extra === null || extra === undefined) return '';
    const enabled = extra.is_enabled ?? false;
    const used = extra.used_credits ?? 0;
    const limit = extra.monthly_limit ?? 0;
    const pct = Math.min(extra.utilization ?? 0, 100);
    const barClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
    return `
      <div class="quota-row">
        <div class="quota-label-row">
          <span class="quota-label">EXTRA USAGE</span>
          <span class="extra-badge">${enabled ? 'ON' : 'OFF'}</span>
        </div>
        ${enabled ? `
        <div class="quota-label-row" style="margin-top:4px">
          <span class="quota-values">$${used.toFixed(2)} / $${limit}</span>
          <span class="quota-values" style="color:var(--text-dim)">(${pct.toFixed(1)}%)</span>
        </div>
        <div class="bar-track" style="margin-top:3px">
          <div class="bar-fill ${barClass}" style="width:${pct}%"></div>
        </div>` : ''}
      </div>`;
  }

  function resetCountdown(isoStr) {
    const resetAt = new Date(isoStr);
    const now = new Date();
    const diff = resetAt - now;
    if (diff <= 0) return 'Resetting...';
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    if (h > 0) return `resets in ${h}h ${m}m`;
    return `resets in ${m}m`;
  }

  function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(0) + 'K';
    return String(n);
  }

  function formatKey(key) {
    return key.replace(/_/g, ' ').toUpperCase();
  }

  function setAnimation(enabled) {
    const canvas = document.getElementById('clawd-canvas');
    const title = document.getElementById('header-title');
    if (enabled) {
      canvas.style.display = '';
      title.innerHTML = 'CLAUDE<br>USAGE';
    } else {
      canvas.style.display = 'none';
      title.innerHTML = 'CLAUDE USAGE';
    }
    if (window.pywebview) {
      const h = document.body.scrollHeight;
      pywebview.api.resize(h);
    }
  }

  // 초기 모드 버튼 상태
  setMode(currentMode, false);

  // ── Clawd 애니메이션 ──────────────────────────────────────
  (function() {
    const _ = 0, O = 1, B = 2;
    const PAL = { 1: '#d4613c', 2: '#111111' };
    const GRID = 20;
    const PAD = 1; // 아웃라인용 1셀 패딩
    const canvas = document.getElementById('clawd-canvas');
    const SCALE = canvas.width / (GRID + PAD * 2);
    const ctx = canvas.getContext('2d');

    const IDLE = [
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,O,O,O,O,O,O,O,O,O,O,O,O,_,_,_,_],
      [_,_,_,O,O,B,B,O,O,O,O,O,O,B,B,O,O,_,_,_],
      [_,_,_,O,O,B,B,O,O,O,O,O,O,B,B,O,O,_,_,_],
      [_,_,_,O,O,B,B,O,O,O,O,O,O,B,B,O,O,_,_,_],
      [_,_,_,O,O,B,B,O,O,O,O,O,O,B,B,O,O,_,_,_],
      [_,_,_,O,O,B,B,O,O,O,O,O,O,B,B,O,O,_,_,_],
      [_,_,_,O,O,O,O,O,O,O,O,O,O,O,O,O,O,_,_,_],
      [_,_,_,O,O,O,O,O,O,O,O,O,O,O,O,O,O,_,_,_],
      [_,_,_,O,O,O,O,O,O,O,O,O,O,O,O,O,O,_,_,_],
      [_,_,_,_,_,O,_,_,O,_,_,O,_,_,O,_,_,_,_,_],
      [_,_,_,_,_,O,_,_,O,_,_,O,_,_,O,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
    ];

    const LC = [[8,0],[8,1],[8,2],[9,0],[9,1],[9,2],[10,0],[10,1],[11,0],[11,1]];
    const RC_IDLE = [[8,17],[8,18],[8,19],[9,17],[9,18],[9,19],[10,18],[10,19],[11,18],[11,19]];
    const RC_SA = [[2,17],[2,18],[2,19],[3,17],[3,18],[4,16],[4,17],[5,16],[5,17],[6,16]];
    const RC_SB = [[1,17],[1,18],[1,19],[2,17],[2,18],[3,16],[3,17],[4,16],[4,17],[5,16]];

    let curRC = RC_IDLE;

    function isBody(r, c) {
      if (r < 0 || r >= GRID || c < 0 || c >= GRID) return false;
      if (IDLE[r][c] === O) return true;
      for (const [lr,lc] of LC) if (lr===r && lc===c) return true;
      for (const [rr,rc] of curRC) if (rr===r && rc===c) return true;
      return false;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#f5f5f5';
      for (let r = 0; r < GRID; r++)
        for (let c = 0; c < GRID; c++)
          if (isBody(r, c))
            for (let dr = -1; dr <= 1; dr++)
              for (let dc = -1; dc <= 1; dc++)
                if (!isBody(r+dr, c+dc))
                  ctx.fillRect((c+dc+PAD)*SCALE, (r+dr+PAD)*SCALE, SCALE, SCALE);
      for (let r = 0; r < GRID; r++)
        for (let c = 0; c < GRID; c++)
          if (IDLE[r][c]) { ctx.fillStyle = PAL[IDLE[r][c]]; ctx.fillRect((c+PAD)*SCALE, (r+PAD)*SCALE, SCALE, SCALE); }
      ctx.fillStyle = PAL[O];
      for (const [r,c] of LC) ctx.fillRect((c+PAD)*SCALE, (r+PAD)*SCALE, SCALE, SCALE);
      for (const [r,c] of curRC) ctx.fillRect((c+PAD)*SCALE, (r+PAD)*SCALE, SCALE, SCALE);
    }

    const SEQ = [
      ...Array(120).fill(0),
      ...Array(12).fill(1), ...Array(12).fill(2),
      ...Array(12).fill(1), ...Array(12).fill(2),
      ...Array(12).fill(1), ...Array(12).fill(2),
    ];
    let idx = 0;

    function animate() {
      const s = SEQ[idx % SEQ.length];
      curRC = s === 0 ? RC_IDLE : s === 1 ? RC_SA : RC_SB;
      draw();
      idx++;
      requestAnimationFrame(animate);
    }
    animate();
  })();
</script>
</body>
</html>
